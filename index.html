<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2048 Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-layout">

  <!-- GAME -->
  <div class="game-section">

    <h1 class="title">2048</h1>

    <div class="scores">
      <div class="score-box">SCORE <div id="score">0</div></div>
      <div class="score-box">BEST <div id="best">0</div></div>
    </div>

    <button class="new-game" onclick="restartGame()">New Game</button>

    <div id="grid" class="grid"></div>

  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel">

    <h2>HOW TO PLAY</h2>

    <p>
      Use arrow keys (↑ ↓ ← →) to move tiles.<br>
      Same numbers merge into one!
    </p>

    <div class="example-row">
      <div class="tile-mini">2</div>
      <span>+</span>
      <div class="tile-mini">2</div>
      <span>=</span>
      <div class="tile-mini result">4</div>
    </div>

    <div class="arrow-grid">
      <div class="arrow-box">↑<br>Up</div>
      <div class="arrow-box">↓<br>Down</div>
      <div class="arrow-box">←<br>Left</div>
      <div class="arrow-box">→<br>Right</div>
    </div>

  </div>

</div>


<!-- GAME OVER -->
<div id="gameOver" class="overlay hidden">
  <div class="popup">

    <h2>💀 Game Over</h2>
    <p class="sub-text">Better luck next time!</p>

    <button class="retry-btn" onclick="restartGame()">
      🔁 Try Again
    </button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
